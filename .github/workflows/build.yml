name: Build HawkLauncher APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Install Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: '8.2'

    - name: Build Debug APK
      working-directory: HawkLauncher
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HawkLauncher-debug
        path: HawkLauncher/app/build/outputs/apk/debug/app-debug.apk
